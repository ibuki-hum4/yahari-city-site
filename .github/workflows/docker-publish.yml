name: Build and Push

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # cosignのkeyless署名(Sigstore OIDC)に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: "v3.1.1"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # docker-bake.hclでapp/migratorの2ターゲットを定義し、1回のbuildxグラフで
      # 共有ステージ(deps/builder)を1度だけ実行してから両イメージをpushする
      # (build-push-actionを2回呼ぶより、共有ステージの再実行・キャッシュ往復が減って速い)
      - name: Build and push images
        id: bake
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.cache-from=type=gha,scope=yahari-city
            *.cache-to=type=gha,scope=yahari-city,mode=max
        env:
          VERSION: ${{ steps.version.outputs.value }}

      # ダイジェスト指定でkeyless署名する(Fulcio/Rekorを使用。鍵管理は不要)
      - name: Sign images
        run: |
          echo '${{ steps.bake.outputs.metadata }}' > /tmp/metadata.json
          cosign sign --yes "docker.io/kemar1/yahari-city@$(jq -r '.app["containerimage.digest"]' /tmp/metadata.json)"
          cosign sign --yes "docker.io/kemar1/yahari-city-migrate@$(jq -r '.migrator["containerimage.digest"]' /tmp/metadata.json)"
