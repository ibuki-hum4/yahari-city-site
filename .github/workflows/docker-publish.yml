name: Build and Push

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # cosignのkeyless署名(Sigstore OIDC)に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: "v3.1.1"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        id: build-app
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runner
          push: true
          tags: |
            docker.io/kemar1/yahari-city:${{ steps.version.outputs.value }}
            docker.io/kemar1/yahari-city:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrator image
        id: build-migrator
        uses: docker/build-push-action@v7
        with:
          context: .
          target: migrator
          push: true
          tags: |
            docker.io/kemar1/yahari-city-migrate:${{ steps.version.outputs.value }}
            docker.io/kemar1/yahari-city-migrate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ダイジェスト指定でkeyless署名する(Fulcio/Rekorを使用。鍵管理は不要)
      - name: Sign app image
        run: cosign sign --yes "docker.io/kemar1/yahari-city@${{ steps.build-app.outputs.digest }}"

      - name: Sign migrator image
        run: cosign sign --yes "docker.io/kemar1/yahari-city-migrate@${{ steps.build-migrator.outputs.digest }}"
