apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yahari-app-ingress
  namespace: yahari-city
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - yahari-city.skyia.jp
      secretName: yahari-app-tls
  rules:
    - host: yahari-city.skyia.jp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yahari-app
                port:
                  number: 80
